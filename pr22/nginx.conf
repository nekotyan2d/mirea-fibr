events {}

http {
    upstream backend {
        server app1:3000 max_fails=2 fail_timeout=30s;
        server app2:3001 max_fails=2 fail_timeout=30s;
        server app3:3002 backup;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
        }
    }
}
